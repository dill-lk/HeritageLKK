name: Mobile Build (APK + iOS)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      SIGNING_ENABLED: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: |
          rm -rf src-tauri/gen/android
          corepack pnpm tauri:android:init

      - name: Build APK
        run: corepack pnpm tauri:android:build

      - name: Decode Android signing keystore
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore
          chmod 600 /tmp/release.keystore

      - name: Sign APK
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APK_PATH="$(find src-tauri/gen/android/app/build/outputs -type f -name '*-unsigned.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No unsigned APK found to sign."
            exit 1
          fi

          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* 2>/dev/null | sort -V | tail -n 1)"
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "Android build-tools not found under ANDROID_HOME=$ANDROID_HOME"
            exit 1
          fi
          SIGNED_APK="${APK_PATH%-unsigned.apk}-signed.apk"

          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "env:ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "env:ANDROID_KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$APK_PATH"

          "$BUILD_TOOLS_DIR/apksigner" verify --verbose "$SIGNED_APK"
          echo "SIGNED_APK_PATH=$SIGNED_APK" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: warn

      - name: Upload signed APK artifact
        if: ${{ env.SIGNED_APK_PATH != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-signed
          path: ${{ env.SIGNED_APK_PATH }}
          if-no-files-found: error

  ios:
    name: Build iOS artifact
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Add iOS rust targets
        run: corepack pnpm tauri:ios:targets

      - name: Build iOS target
        run: corepack pnpm tauri:ios:build

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            target/aarch64-apple-ios/release/*
          if-no-files-found: warn
